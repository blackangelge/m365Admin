services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: m365admin_nginx
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - m365admin_certs:/etc/nginx/certs
    depends_on:
      m365admin:
        condition: service_healthy
    networks:
      m365net:
        ipv4_address: 172.20.0.2

  m365admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: m365admin
    restart: unless-stopped
    env_file: .env
    volumes:
      - m365admin_data:/data
    networks:
      m365net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  m365admin_data:
    driver: local
  m365admin_certs:
    driver: local

networks:
  m365net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
