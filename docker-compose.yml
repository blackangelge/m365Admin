services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: m365admin_nginx
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs
    depends_on:
      m365admin:
        condition: service_healthy
    networks:
      m365net:
        ipv4_address: 172.20.0.2

  m365admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: m365admin
    restart: unless-stopped
    env_file: .env
    volumes:
      # Bind-Mount: Datenbankdatei ist direkt im Projektordner ./db/ sichtbar
      - ./db:/db
      # Bind-Mount: App-Quellcode — Änderungen auf dem Host sind sofort im
      # Container sichtbar. uvicorn --reload (APP_DEBUG=true) lädt dann
      # automatisch neu, wenn Python-Dateien oder Templates geändert werden.
      - ./app:/app/app
    networks:
      m365net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

networks:
  m365net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
